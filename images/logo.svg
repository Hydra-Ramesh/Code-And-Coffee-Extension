<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="cupGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4B2E2A"/>
      <stop offset="100%" style="stop-color:#2C1810"/>
    </linearGradient>
    <linearGradient id="coffeeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C68E5A"/>
      <stop offset="100%" style="stop-color:#8B5E3C"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A120B"/>
      <stop offset="100%" style="stop-color:#2C1810"/>
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="64" cy="64" r="62" fill="url(#bgGrad)" stroke="#C68E5A" stroke-width="2"/>

  <!-- Steam Lines -->
  <path d="M 44 38 Q 42 30 44 22" fill="none" stroke="#D7CCC8" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <animate attributeName="d" values="M 44 38 Q 42 30 44 22;M 44 38 Q 46 30 44 22;M 44 38 Q 42 30 44 22" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 56 34 Q 54 26 56 18" fill="none" stroke="#D7CCC8" stroke-width="2" stroke-linecap="round" opacity="0.4">
    <animate attributeName="d" values="M 56 34 Q 54 26 56 18;M 56 34 Q 58 26 56 18;M 56 34 Q 54 26 56 18" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 68 36 Q 66 28 68 20" fill="none" stroke="#D7CCC8" stroke-width="2" stroke-linecap="round" opacity="0.45">
    <animate attributeName="d" values="M 68 36 Q 66 28 68 20;M 68 36 Q 70 28 68 20;M 68 36 Q 66 28 68 20" dur="1.8s" repeatCount="indefinite"/>
  </path>

  <!-- Coffee Cup Body -->
  <rect x="30" y="42" width="52" height="40" rx="6" ry="6" fill="url(#cupGrad)"/>

  <!-- Coffee Liquid -->
  <rect x="34" y="46" width="44" height="16" rx="3" ry="3" fill="url(#coffeeGrad)"/>

  <!-- Cup Handle -->
  <path d="M 82 50 Q 98 50 98 62 Q 98 74 82 74" fill="none" stroke="#4B2E2A" stroke-width="5" stroke-linecap="round"/>

  <!-- Cup Saucer -->
  <ellipse cx="56" cy="86" rx="36" ry="6" fill="#4B2E2A" opacity="0.8"/>

  <!-- Code Brackets on Cup -->
  <text x="40" y="73" font-family="monospace" font-size="18" font-weight="bold" fill="#C68E5A" opacity="0.9">&lt;/&gt;</text>

  <!-- Bottom Text -->
  <text x="64" y="110" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#D7CCC8" text-anchor="middle" letter-spacing="1.5">CODE &amp; COFFEE</text>
</svg>
