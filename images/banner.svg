<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A120B"/>
      <stop offset="30%" style="stop-color:#2C1810"/>
      <stop offset="70%" style="stop-color:#1E1412"/>
      <stop offset="100%" style="stop-color:#0F0A07"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C68E5A;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#C68E5A;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="warmGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C68E5A;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#C68E5A;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bannerBg)"/>

  <!-- Warm ambient glow -->
  <circle cx="640" cy="320" r="400" fill="url(#warmGlow)"/>

  <!-- Subtle grid pattern for tech feel -->
  <g opacity="0.03" stroke="#C68E5A" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Decorative coffee beans (left) -->
  <g opacity="0.08">
    <ellipse cx="120" cy="180" rx="25" ry="40" fill="#C68E5A" transform="rotate(-30 120 180)"/>
    <line x1="107" y1="155" x2="133" y2="205" stroke="#1A120B" stroke-width="2"/>
    <ellipse cx="200" cy="480" rx="20" ry="32" fill="#C68E5A" transform="rotate(15 200 480)"/>
    <line x1="190" y1="458" x2="210" y2="502" stroke="#1A120B" stroke-width="2"/>
    <ellipse cx="1100" cy="150" rx="22" ry="35" fill="#C68E5A" transform="rotate(45 1100 150)"/>
    <line x1="1088" y1="125" x2="1112" y2="175" stroke="#1A120B" stroke-width="2"/>
    <ellipse cx="1160" cy="500" rx="18" ry="28" fill="#C68E5A" transform="rotate(-20 1160 500)"/>
    <line x1="1152" y1="480" x2="1168" y2="520" stroke="#1A120B" stroke-width="2"/>
  </g>

  <!-- Coffee Cup Icon (center-left) -->
  <g transform="translate(380, 210)">
    <!-- Steam -->
    <path d="M 40 -5 Q 36 -25 40 -45" fill="none" stroke="#D7CCC8" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <path d="M 60 -10 Q 56 -30 60 -50" fill="none" stroke="#D7CCC8" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
    <path d="M 80 -5 Q 76 -25 80 -45" fill="none" stroke="#D7CCC8" stroke-width="3" stroke-linecap="round" opacity="0.28"/>

    <!-- Cup -->
    <rect x="15" y="0" width="90" height="70" rx="10" fill="#4B2E2A"/>
    <rect x="22" y="7" width="76" height="28" rx="5" fill="#C68E5A" opacity="0.6"/>

    <!-- Handle -->
    <path d="M 105 15 Q 135 15 135 35 Q 135 55 105 55" fill="none" stroke="#4B2E2A" stroke-width="7" stroke-linecap="round"/>

    <!-- Saucer -->
    <ellipse cx="60" cy="78" rx="60" ry="10" fill="#4B2E2A" opacity="0.6"/>

    <!-- Code on cup -->
    <text x="38" y="58" font-family="monospace" font-size="28" font-weight="bold" fill="#C68E5A">&lt;/&gt;</text>
  </g>

  <!-- Main Title -->
  <text x="700" y="270" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="700" fill="#F5E6D3" letter-spacing="2">Code &amp; Coffee</text>

  <!-- Subtitle -->
  <text x="700" y="330" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="400" fill="#C68E5A" letter-spacing="3">THEME FOR VISUAL STUDIO CODE</text>

  <!-- Description -->
  <text x="700" y="390" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#A89490" letter-spacing="1">A warm, cozy coding experience inspired by late-night coffee shops</text>

  <!-- Feature pills -->
  <g transform="translate(700, 430)">
    <rect x="0" y="0" width="110" height="32" rx="16" fill="#2C1810" stroke="#C68E5A" stroke-width="1" opacity="0.8"/>
    <text x="55" y="21" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#C68E5A" text-anchor="middle" font-weight="500">Dark Theme</text>

    <rect x="125" y="0" width="130" height="32" rx="16" fill="#2C1810" stroke="#C68E5A" stroke-width="1" opacity="0.8"/>
    <text x="190" y="21" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#C68E5A" text-anchor="middle" font-weight="500">Midnight Theme</text>

    <rect x="270" y="0" width="115" height="32" rx="16" fill="#2C1810" stroke="#C68E5A" stroke-width="1" opacity="0.8"/>
    <text x="327" y="21" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#C68E5A" text-anchor="middle" font-weight="500">Latte Theme</text>

    <rect x="400" y="0" width="130" height="32" rx="16" fill="#2C1810" stroke="#C68E5A" stroke-width="1" opacity="0.8"/>
    <text x="465" y="21" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#C68E5A" text-anchor="middle" font-weight="500">Focus Tools</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="630" width="1280" height="10" fill="#C68E5A" opacity="0.6"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="#C68E5A" opacity="0.3"/>
</svg>
